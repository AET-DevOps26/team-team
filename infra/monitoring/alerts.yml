groups:
  - name: banking-alerts
    rules:
      - alert: HighP95Latency
        expr: histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket[5m]))) > 1.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "P95 latency has been above 1.5 seconds for 5 minutes."
