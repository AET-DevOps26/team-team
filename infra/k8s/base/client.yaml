apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: banking-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: ghcr.io/aet-devops26/client:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: banking-system
spec:
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
