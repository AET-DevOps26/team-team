apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-service
  namespace: banking-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genai-service
  template:
    metadata:
      labels:
        app: genai-service
    spec:
      containers:
        - name: genai-service
          image: ghcr.io/aet-devops26/genai-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PROVIDER
              value: local
---
apiVersion: v1
kind: Service
metadata:
  name: genai-service
  namespace: banking-system
spec:
  selector:
    app: genai-service
  ports:
    - port: 8000
      targetPort: 8000
