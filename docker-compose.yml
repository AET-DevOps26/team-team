networks:
  backend:
    internal: true
  edge: {}

volumes:
  postgres-data:

services:

  # -------------------------
  # TRAEFIK (EDGE ROUTER)
  # -------------------------
  reverse-proxy:
    image: traefik:v3.6.15
    container_name: traefik

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

    networks:
      - edge


  # -------------------------
  # DATABASE
  # -------------------------
  database:
    image: postgres:16-alpine

    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: ${POSTGRES_USER:-bank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bank}

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bankdb"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend


  # -------------------------
  # ACCOUNT SERVICE
  # -------------------------
  account-service:
    image: ghcr.io/aet-devops26/account-service:latest
    build:
      context: ./server
      dockerfile: account-service/Dockerfile

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/bankdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bank}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bank}
      SERVER_PORT: 8081

    depends_on:
      database:
        condition: service_healthy

    networks:
      - backend


  # -------------------------
  # TRANSACTION SERVICE
  # -------------------------
  transaction-service:
    image: ghcr.io/aet-devops26/transaction-service:latest
    build:
      context: ./server
      dockerfile: transaction-service/Dockerfile

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/bankdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bank}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bank}
      SERVER_PORT: 8082

    depends_on:
      database:
        condition: service_healthy

    networks:
      - backend


  # -------------------------
  # GENAI SERVICE
  # -------------------------
  genai-service:
    image: ghcr.io/aet-devops26/genai-service:latest
    build:
      context: ./genai
      dockerfile: Dockerfile

    environment:
      MODEL_PROVIDER: local
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1:8b

    networks:
      - backend


  # -------------------------
  # ORCHESTRATOR (BFF / API LAYER)
  # -------------------------
  orchestrator-service:
    image: ghcr.io/aet-devops26/orchestrator-service:latest
    build:
      context: ./server
      dockerfile: orchestrator-service/Dockerfile

    environment:
      SERVER_PORT: 8083
      ACCOUNT_SERVICE_URL: http://account-service:8081
      TRANSACTION_SERVICE_URL: http://transaction-service:8082
      GENAI_SERVICE_URL: http://genai-service:8000

    depends_on:
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy

    networks:
      - backend
      - edge


  # -------------------------
  # CLIENT (FRONTEND)
  # -------------------------
  client:
    image: ghcr.io/aet-devops26/client:latest
    build:
      context: ./client
      dockerfile: Dockerfile

    environment:
      PUBLIC_API_URL: https://${APP_HOSTNAME}/api

    depends_on:
      - orchestrator-service

    networks:
      - edge


  # -------------------------
  # PROMETHEUS
  # -------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend


  # -------------------------
  # GRAFANA
  # -------------------------
  grafana:
    image: grafana/grafana:11.1.4

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

    networks:
      - edge