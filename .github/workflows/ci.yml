name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # ---------------- Checkout ----------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- Java + Gradle cache ----------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # ---------------- Node ----------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ---------------- Python ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---------------- Cache OWASP DB ----------------
      - name: Cache OWASP Database
        uses: actions/cache@v4
        with:
          path: |
            data/owasp-data
          key: owasp-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            owasp-${{ runner.os }}-

      # ---------------- Tests (backend) ----------------
      - name: Test all services
        run: ./gradlew clean test

      # ---------------- OWASP Dependency Check ----------------
      - name: OWASP Dependency Check
        id: owasp
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAggregate --info --no-configuration-cache

      # ---------------- OWASP PR Summary + Annotations ----------------
      - name: OWASP Summary
        if: always()
        run: |
          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "Check artifacts for full report." >> $GITHUB_STEP_SUMMARY

      # ---------------- Upload OWASP Report ----------------
      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            build/reports
            build/**/security-report

      # ---------------- Python tests ----------------
      - name: Test genai
        working-directory: genai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest

      # ---------------- Frontend tests ----------------
      - name: Test client
        working-directory: client
        run: |
          npm install
          npm run test
          npm run build