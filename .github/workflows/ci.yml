name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test account-service
        working-directory: server/account-service
        run: mvn -B test

      - name: Test transaction-service
        working-directory: server/transaction-service
        run: mvn -B test

      - name: Test orchestrator-service
        working-directory: server/orchestrator-service
        run: mvn -B test

      - name: Test genai
        working-directory: genai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest

      - name: Test client
        working-directory: client
        run: |
          npm install
          npm run test
          npm run build
