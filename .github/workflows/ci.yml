name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # ---------------- Checkout ----------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- Java (with Gradle cache) ----------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # ---------------- Node ----------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ---------------- Python ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---------------- Gradle Tests ----------------
      - name: Test all services
        run: ./gradlew clean test

      # ---------------- OWASP Dependency Check (ALL MODULES) ----------------
      - name: OWASP Dependency Check
        run: ./gradlew dependencyCheckAnalyze

      # ---------------- Python tests ----------------
      - name: Test genai
        working-directory: genai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest

      # ---------------- Frontend tests ----------------
      - name: Test client
        working-directory: client
        run: |
          npm install
          npm run test
          npm run build